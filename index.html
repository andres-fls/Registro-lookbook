<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de acceso</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/registro.css">
</head>

<body>

<div class="form-wrapper">

  <div class="form-header">
    <p class="form-eyebrow">Sistema de acceso · 2026</p>
    <h1>Crear Cuenta</h1>
    <p>Completa los campos para registrarte</p>
  </div>

  <div class="form-card">

    <!-- MENSAJE ÉXITO -->
    <div class="success-message" id="successMessage">
      <div class="success-icon">✓</div>
      <h2>¡Registro exitoso!</h2>
      <p>Tu cuenta ha sido creada correctamente</p>
    </div>

    <!-- ================= REGISTRO ================= -->
    <form id="registerForm" novalidate>

      <div class="field-group">
        <label>Nombre completo</label>
        <div class="input-wrapper">
          <input type="text" id="nombre" placeholder="Ej: Andrés Felipe">
        </div>
        <p class="field-message" id="nombreMsg"></p>
      </div>

      <div class="field-group">
        <label>Correo electrónico</label>
        <div class="input-wrapper">
          <input type="email" id="correo" placeholder="ejemplo@correo.com">
        </div>
        <p class="field-message" id="correoMsg"></p>
      </div>

      <div class="field-group">
        <label>Contraseña</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Mínimo 8 caracteres">
          <button type="button" class="toggle-password"
            onclick="togglePassword('password', this)">👁</button>
        </div>

        <div class="password-strength">
          <div class="strength-bar" id="bar1"></div>
          <div class="strength-bar" id="bar2"></div>
          <div class="strength-bar" id="bar3"></div>
        </div>

        <p class="strength-label" id="strengthLabel"></p>
        <p class="field-message" id="passwordMsg"></p>
      </div>

      <div class="field-group">
        <label>Confirmar contraseña</label>
        <div class="input-wrapper">
          <input type="password" id="confirmar">
          <button type="button" class="toggle-password"
            onclick="togglePassword('confirmar', this)">👁</button>
        </div>
        <p class="field-message" id="confirmarMsg"></p>
      </div>

      <button type="submit" class="btn-submit">
        Crear cuenta
      </button>

      <p class="switch-form">
        ¿Ya estás registrado?
        <a href="#" onclick="mostrarLogin()">Inicia sesión</a>
      </p>

    </form>

    <!-- ================= LOGIN ================= -->
    <form id="loginForm" style="display:none;" novalidate>

      <div class="field-group">
        <label>Correo electrónico</label>
        <div class="input-wrapper">
          <input type="email" id="loginCorreo">
        </div>
      </div>

      <div class="field-group">
        <label>Contraseña</label>
        <div class="input-wrapper">
          <input type="password" id="loginPassword">
          <button type="button" class="toggle-password"
            onclick="togglePassword('loginPassword', this)">👁</button>
        </div>
      </div>

      <button type="submit" class="btn-submit">
        Iniciar sesión
      </button>

      <p class="switch-form">
        ¿No tienes cuenta?
        <a href="#" onclick="mostrarRegistro()">Crear cuenta</a>
      </p>

    </form>

  </div>
</div>

<script src="js/registro.js"></script>

</body>
</html>
